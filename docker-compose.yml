version: "3.9"

services:
  api:
    build: .
    container_name: autocomplete_api
    ports:
      - "8001:8000"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: autocomplete_redis
    ports:
      - "6379:6379"
